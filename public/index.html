<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>経費精算 / Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161922;
    --surface2: #1e2230;
    --border: #2a2f3e;
    --accent: #4fffb0;
    --accent2: #7c8cff;
    --danger: #ff5c7c;
    --warn: #ffb84f;
    --text: #e8eaf2;
    --muted: #6b7390;
    --shadow: 0 4px 32px rgba(0,0,0,0.5);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(79,255,176,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(79,255,176,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: calc(100vw - 40px); margin: 0 auto; padding: 36px 20px 80px; }

  /* ── Header ── */
  header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 36px; flex-wrap: wrap; gap: 16px; }
  .logo-mark { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent); background: rgba(79,255,176,0.08); border: 1px solid rgba(79,255,176,0.2); padding: 3px 10px; border-radius: 4px; letter-spacing: 2px; display: inline-block; margin-bottom: 8px; }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 12px; color: var(--muted); margin-top: 5px; font-weight: 300; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; margin-top: 2px; }
  .lang-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 4px; }
  .lang-btn { background: none; border: none; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer; padding: 4px 14px; border-radius: 100px; transition: all 0.2s; }
  .lang-btn.active { background: var(--accent); color: #000; font-weight: 700; }

  /* Notion status */
  .notion-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .notion-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .notion-dot.ok { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .notion-dot.err { background: var(--danger); }
  .notion-dot.loading { background: var(--warn); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Layout ── */
  .layout { display: grid; grid-template-columns: 310px 1fr; gap: 20px; align-items: start; }
  @media (max-width: 780px) { .layout { grid-template-columns: 1fr; } }

  /* ── Panel ── */
  .panel, .results-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .panel-header, .results-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .panel-left { display: flex; align-items: center; gap: 10px; }
  .panel-title { font-size: 11px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dot-purple { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
  .panel-body { padding: 18px; min-height: 520px; }

  /* ── Input tabs ── */
  .input-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .input-tab { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 10px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans JP', sans-serif; color: var(--muted); font-size: 12px; font-weight: 500; position: relative; overflow: hidden; }
  .input-tab input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .input-tab:hover, .input-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(79,255,176,0.04); }
  .input-tab .tab-icon { font-size: 22px; }

  /* ── Preview ── */
  #preview-wrap { display: none; position: relative; margin-bottom: 14px; }
  #preview-img { width: 100%; border-radius: 10px; border: 1px solid var(--border); display: block; max-height: 240px; object-fit: contain; background: var(--surface2); }
  #preview-pdf { width: 100%; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); display: none; align-items: center; justify-content: center; gap: 10px; padding: 28px; color: var(--muted); font-size: 13px; }
  .preview-clear { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); border: none; color: var(--text); width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .preview-clear:hover { background: var(--danger); }

  /* ── Batch queue ── */
  #batch-queue-wrap { margin-bottom: 14px; }
  .batch-queue-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .batch-queue-count { font-size: 11px; color: var(--muted); font-weight: 500; }
  .batch-clear-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .batch-clear-btn:hover { border-color: var(--danger); color: var(--danger); }
  .batch-queue-list { display: flex; flex-direction: column; gap: 8px; max-height: 360px; overflow-y: auto; margin-bottom: 12px; padding-right: 2px; }
  .batch-item { display: flex; gap: 10px; padding: 10px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; transition: border-color 0.2s; }
  .batch-item.status-done { border-color: var(--accent); }
  .batch-item.status-error { border-color: var(--danger); }
  .batch-item-thumb { width: 44px; height: 44px; border-radius: 8px; background: var(--surface); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; font-size: 18px; }
  .batch-item-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .batch-item-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .batch-item-name { font-size: 11px; color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .batch-item-picks { display: flex; flex-direction: column; gap: 4px; }
  .mini-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .mini-btn { padding: 4px 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; font-size: 10px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .mini-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mini-btn.selected { border-color: var(--accent); color: #000; background: var(--accent); font-weight: 700; }
  .batch-remark-input { width: 100%; padding: 6px 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 10px; }
  .batch-remark-input:focus { outline: none; border-color: var(--accent); }
  .batch-item-status { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .batch-status-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; padding: 3px 7px; border-radius: 100px; color: var(--muted); background: var(--surface); white-space: nowrap; }
  .batch-item.status-analyzing .batch-status-badge { color: var(--warn); }
  .batch-item.status-done .batch-status-badge { color: var(--accent); }
  .batch-item.status-error .batch-status-badge { color: var(--danger); }
  .batch-item-error { font-size: 9px; color: var(--danger); max-width: 120px; text-align: right; }
  .batch-retry-btn, .batch-remove-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 20px; height: 20px; border-radius: 50%; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .batch-retry-btn:hover { border-color: var(--warn); color: var(--warn); }
  .batch-remove-btn:hover { border-color: var(--danger); color: var(--danger); }
  .batch-analyze-btn { display: block; width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .batch-analyze-btn:hover:not(:disabled) { background: #6fffc4; transform: translateY(-1px); }
  .batch-analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── Camera modal ── */
  #camera-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  #camera-modal.open { display: flex; }
  #camera-video { width: min(100vw - 32px, 480px); border-radius: 12px; border: 2px solid var(--accent); background: #000; }
  #camera-canvas { display: none; }
  .camera-controls { display: flex; gap: 16px; align-items: center; }
  .shutter-btn { width: 64px; height: 64px; border-radius: 50%; background: var(--accent); border: 4px solid rgba(79,255,176,0.3); cursor: pointer; transition: transform 0.1s; font-size: 24px; display: flex; align-items: center; justify-content: center; }
  .shutter-btn:active { transform: scale(0.9); }
  .cam-close-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; }

  /* ── Analyze btn ── */
  #analyze-btn { display: none; width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  #analyze-btn:hover:not(:disabled) { background: #6fffc4; transform: translateY(-1px); }
  #analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── Loading ── */
  .loading-bar { display: none; margin-top: 14px; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .loading-bar.active { display: block; }
  .loading-bar::after { content: ''; display: block; height: 100%; width: 40%; background: var(--accent); border-radius: 3px; animation: loadslide 1.2s ease-in-out infinite; }
  @keyframes loadslide { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
  .loading-text { display: none; text-align: center; font-size: 12px; color: var(--muted); margin-top: 10px; }
  .loading-text.active { display: block; }
  .error-msg { display: none; margin-top: 12px; padding: 11px 14px; background: rgba(255,92,124,0.08); border: 1px solid rgba(255,92,124,0.25); border-radius: 8px; font-size: 12px; color: var(--danger); line-height: 1.5; }

  /* ── Actions ── */
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 7px 14px; border-radius: 8px; border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-csv { background: rgba(124,140,255,0.12); color: var(--accent2); border: 1px solid rgba(124,140,255,0.25); }
  .btn-csv:hover { background: rgba(124,140,255,0.22); }
  .btn-xls { background: rgba(79,255,176,0.12); color: var(--accent); border: 1px solid rgba(79,255,176,0.25); }
  .btn-xls:hover { background: rgba(79,255,176,0.22); }
  .btn-refresh { background: rgba(255,184,79,0.1); color: var(--warn); border: 1px solid rgba(255,184,79,0.25); }
  .btn-refresh:hover { background: rgba(255,184,79,0.2); }
  .btn-apply { background: rgba(124,140,255,0.18); color: var(--accent2); border: 1px solid rgba(124,140,255,0.35); font-weight: 700; }
  .btn-apply:hover { background: rgba(124,140,255,0.3); }
  .icon-btn.save-dirty { color: var(--warn); }
  .apply-skip-btn { padding: 10px 20px; background: rgba(255,184,79,0.15); color: var(--warn); border: 1px solid rgba(255,184,79,0.35); border-radius: 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 600; transition: all 0.15s; }
  .apply-skip-btn:hover { background: rgba(255,184,79,0.25); }
  .dup-warning { background: rgba(255,184,79,0.07); border: 1px solid rgba(255,184,79,0.3); border-radius: 8px; padding: 12px 16px; }
  .dup-warning strong { color: var(--warn); font-size: 13px; display: block; margin-bottom: 4px; }
  .dup-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .dup-list { margin: 6px 0 0 14px; font-size: 12px; color: var(--muted); line-height: 1.8; }
  .apply-dup-row td:first-child::after { content: ' ⚠'; color: var(--warn); }
  .pm-subtotals { padding: 10px 18px 14px; border-top: 1px solid var(--border); }
  .pm-subtotals-title { font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .pm-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
  .pm-table th { text-align: left; color: var(--muted); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px; font-weight: 500; white-space: nowrap; }
  .pm-table td { padding: 5px 10px; border-top: 1px solid rgba(42,47,62,0.5); white-space: nowrap; }
  .pm-label { color: var(--muted); font-size: 11px; min-width: 100px; }
  .pm-draft { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text); }
  .pm-submitted-amt { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--warn); }
  .pm-rows { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .pm-row { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid rgba(124,140,255,0.25); border-radius: 8px; padding: 5px 12px; }
  .pm-row-label { font-size: 11px; color: var(--muted); }
  .pm-row-amount { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; color: var(--accent2); }

  /* ── Status badge ── */
  .status-badge { font-size: 10px; padding: 3px 9px; border-radius: 100px; font-weight: 700; white-space: nowrap; border: none; font-family: 'Noto Sans JP', sans-serif; transition: opacity 0.15s; display: inline-block; }
  .status-badge.clickable { cursor: pointer; }
  .status-badge.clickable:hover { opacity: 0.75; }
  .status-Draft     { background: var(--surface2); color: var(--muted); }
  .status-Submitted { background: rgba(255,184,79,0.18); color: var(--warn); }
  .status-Approved  { background: rgba(79,255,176,0.18); color: var(--accent); }
  .status-Rejected  { background: rgba(255,92,124,0.18); color: var(--danger); }

  /* ── Apply confirmation modal ── */
  .apply-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 2100; display: flex; align-items: center; justify-content: center; }
  .apply-modal.hidden { display: none; }
  .apply-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px 28px; width: min(580px, 94vw); max-height: 82vh; overflow-y: auto; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 18px; }
  .apply-box h2 { font-size: 18px; font-weight: 700; }
  .apply-sub { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .apply-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .apply-table th { text-align: left; color: var(--muted); font-weight: 500; padding: 6px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .apply-table td { padding: 8px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .apply-totals { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--muted); padding-top: 4px; }
  .apply-totals span strong { color: var(--accent); font-family: 'Space Mono', monospace; }
  .apply-actions { display: flex; gap: 10px; justify-content: flex-end; padding-top: 4px; }
  .apply-cancel-btn { padding: 10px 20px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; transition: all 0.15s; }
  .apply-cancel-btn:hover { border-color: var(--muted); color: var(--text); }
  .apply-confirm-btn { padding: 10px 28px; background: var(--accent2); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; transition: opacity 0.15s; }
  .apply-confirm-btn:hover { opacity: 0.85; }

  /* ── Checkbox column ── */
  .check-cell { width: 28px; text-align: center; padding: 0 4px; }
  .row-check { width: 14px; height: 14px; accent-color: var(--accent2); cursor: pointer; }
  .row-check:disabled { opacity: 0.3; cursor: default; }

  /* ── Search bar ── */
  .search-bar { display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-bottom: 1px solid var(--border); }
  .search-icon { font-size: 13px; opacity: 0.6; flex-shrink: 0; }
  .search-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; padding: 8px 12px; outline: none; transition: border-color 0.15s; min-width: 0; }
  .search-input:focus { border-color: rgba(79,255,176,0.4); }
  .search-input::placeholder { color: var(--muted); }
  .search-clear-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .search-clear-btn:hover { border-color: var(--danger); color: var(--danger); }
  .search-count { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; font-family: 'Space Mono', monospace; }

  /* ── Scroll mirror (top scrollbar) ── */
  .scroll-mirror { overflow-x: scroll; overflow-y: hidden; padding: 0 18px; }
  .scroll-mirror-inner { height: 1px; }
  .scroll-mirror::-webkit-scrollbar { height: 6px; }
  .scroll-mirror::-webkit-scrollbar-track { background: var(--surface2); border-radius: 3px; }
  .scroll-mirror::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .scroll-mirror::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; padding: 18px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { border-bottom: 2px solid var(--border); }
  th { padding: 9px 12px; text-align: left; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); font-weight: 500; white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(42,47,62,0.5); vertical-align: middle; white-space: nowrap; }
  tbody tr:hover { background: rgba(255,255,255,0.015); }
  tbody tr:last-child td { border-bottom: none; }
  .num-cell { color: var(--muted); font-size: 11px; font-family: 'Space Mono', monospace; }
  .amount-cell { font-family: 'Space Mono', monospace; }
  .note-cell, .remark-cell { white-space: normal; min-width: 180px; max-width: 300px; }
  td[contenteditable=true] { outline: none; cursor: text; }
  td[contenteditable=true]:focus { background: rgba(79,255,176,0.04); outline: 1px solid rgba(79,255,176,0.4); border-radius: 4px; }
  select.cat-select, select.cur-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 4px 6px; border-radius: 6px; font-size: 11px; font-family: 'Noto Sans JP', sans-serif; }
  select.cur-select { font-family: 'Space Mono', monospace; max-width: 80px; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 3px 5px; border-radius: 4px; transition: color 0.15s; }
  .icon-btn.del:hover { color: var(--danger); }
  .notion-saved { font-size: 10px; color: var(--accent); opacity: 0.7; }

  /* ── Subtotals ── */
  .subtotals { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; }
  .subtotal-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .subtotal-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; display: flex; flex-direction: column; gap: 1px; }
  .chip-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .chip-value { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; color: var(--accent); }
  .subtotal-chip-eur { border-color: var(--accent2); }
  .subtotal-chip-eur .chip-value { color: var(--accent2); }
  .edit-hint { font-size: 11px; color: var(--muted); }

  /* ── Empty state ── */
  .empty-state { padding: 52px 20px; text-align: center; color: var(--muted); }
  .empty-state .icon { font-size: 36px; margin-bottom: 10px; }

  .sel-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .sel-btn { flex: 1; min-width: 70px; padding: 9px 8px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }

  .remark-textarea:focus { outline: none; border-color: rgba(79,255,176,0.4); background: rgba(79,255,176,0.02); }
  .remark-textarea::placeholder { color: var(--muted); }
  select.pm-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 4px 6px; border-radius: 6px; font-size: 11px; font-family: 'Noto Sans JP', sans-serif; max-width: 130px; }

  .toast { position: fixed; bottom: 28px; right: 24px; background: var(--surface2); border: 1px solid var(--border); padding: 11px 16px; border-radius: 10px; font-size: 13px; box-shadow: var(--shadow); transform: translateY(70px); opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; max-width: 300px; }

  .login-modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
  .login-modal.hidden { display: none; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 44px 36px; width: min(380px, 90vw); display: flex; flex-direction: column; gap: 18px; align-items: center; text-align: center; box-shadow: var(--shadow); }
  .login-box h2 { font-size: 22px; font-weight: 700; }
  .login-box h2 span { color: var(--accent); }
  .login-sub { color: var(--muted); font-size: 13px; line-height: 1.5; }
  .login-input { width: 100%; padding: 13px 16px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; outline: none; text-align: center; transition: border-color 0.15s; }
  .login-input:focus { border-color: rgba(79,255,176,0.5); }
  .login-btn { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .login-btn:hover { background: #6fffc4; transform: translateY(-1px); }

  .user-badge { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 5px 5px 5px 12px; }
  .user-name { font-size: 12px; font-weight: 500; color: var(--accent); font-family: 'Space Mono', monospace; }
  .logout-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-family: 'Noto Sans JP', sans-serif; font-size: 11px; padding: 4px 10px; border-radius: 100px; cursor: pointer; transition: all 0.15s; }
  .logout-btn:hover { color: var(--danger); border-color: var(--danger); }
</style>

<body>
<div class="app">
  <header>
    <div>
      <div class="logo-mark">EXPENSE</div>
      <h1 id="h-title">経費精算 <span>System</span></h1>
      <p class="subtitle" id="h-sub">レシートをAI解析 → Notionに自動保存 → Excel / CSV出力</p>
    </div>
    <div class="header-right">
      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="btn-ja" onclick="setLang('ja')">JA</button>
      </div>
      <div class="notion-status">
        <div class="notion-dot" id="notion-dot"></div>
        <span id="notion-status-txt">Notion</span>
      </div>
      <div class="user-badge" id="user-badge" style="display:none">
        <span class="user-name" id="user-name-display"></span>
        <button class="logout-btn" id="logout-btn" onclick="logout()">Sign out</button>
      </div>
    </div>
  </header>

  <div class="layout">
    <!-- Left -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-left">

        </div>
      </div>
      <div class="panel-body">
        <input type="file" id="row-photo-input" accept="image/*,application/pdf" style="display:none">
        <div class="input-tabs">
          <label class="input-tab" id="tab-upload">
            <input type="file" id="file-input" accept="image/*,application/pdf" multiple>
            <span class="tab-icon">🖼️</span>
            <span id="tab-upload-lbl">画像を選択</span>
          </label>
          <button class="input-tab" id="tab-camera" onclick="openCamera()">
            <span class="tab-icon">📷</span>
            <span id="tab-camera-lbl">カメラで撮影</span>
          </button>
        </div>
        <div id="preview-wrap">
          <img id="preview-img" src="" alt="preview">
          <div id="preview-pdf">📄 <span id="preview-pdf-name"></span></div>
          <button class="preview-clear" onclick="clearPreview()">✕</button>
        </div>
        <div id="selection-flow" style="display:none">
          <div class="sel-divider"></div>
          <div class="sel-step" id="step-payment">
            <div class="sel-step-label" id="lbl-payment">支払い方法</div>
            <div class="sel-btns">
              <button class="sel-btn" onclick="selectPaymentMethod('Corporate')">Corporate</button>
              <button class="sel-btn" onclick="selectPaymentMethod('Personal')">Personal</button>
              <button class="sel-btn" onclick="selectPaymentMethod('Cash')">Cash</button>
            </div>
          </div>
          <div class="sel-step" id="step-cost" style="display:none">
            <div class="sel-step-label" id="lbl-cost">コストセンター</div>
            <div class="sel-btns">
              <button class="sel-btn" onclick="selectCostCenter('MSE')">MSE</button>
              <button class="sel-btn" onclick="selectCostCenter('MJ')">MJ</button>
              <button class="sel-btn" onclick="selectCostCenter('Other')">Other</button>
            </div>
          </div>
          <div class="sel-step" id="step-remark" style="display:none">
            <div class="sel-step-label" id="lbl-remark">Remark（任意）</div>
            <textarea id="remark-input" class="remark-textarea" placeholder="レシートに関するメモを入力…" oninput="currentRemark=this.value"></textarea>
          </div>
        </div>
        <div id="batch-queue-wrap" style="display:none">
          <div class="batch-queue-header">
            <span id="batch-queue-count" class="batch-queue-count"></span>
            <button type="button" class="batch-clear-btn" onclick="clearBatchQueue()">✕</button>

          <div id="batch-queue-list" class="batch-queue-list"></div>
          <button type="button" id="batch-analyze-btn" class="batch-analyze-btn" onclick="analyzeBatch()" disabled></button>
        </div>
        <div class="loading-bar" id="loading-bar"></div>
        <div class="loading-text" id="loading-text">🤖 AIがレシートを解析中…</div>

      </div>

        <span class="search-icon">🔍</span>

              <th id="th-date">日付</th>

              <th id="th-cat">カテゴリ</th>
              <th id="th-cur">通貨</th>
              <th id="th-amt">金額</th>
              <th id="th-payment">支払方法</th>
              <th id="th-cc">CC</th>
              <th id="th-note">備考</th>
              <th id="th-remark">Remark</th>
              <th id="th-status">ステータス</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr id="empty-row"><td colspan="13">
              <div class="empty-state">
                <div class="icon">📋</div>
                <p id="empty-txt">レシートをアップロード・撮影してAI解析するか<br>「行を追加」で手動入力してください</p>
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>

      <div class="subtotals" id="subtotals-strip" style="display:none">
        <div class="subtotal-chips" id="subtotal-chips"></div>
        <span class="edit-hint" id="edit-hint">セルをクリックして編集</span>
      </div>
      <div class="pm-subtotals" id="pm-subtotals" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div id="login-modal" class="login-modal">
  <div class="login-box">
    <div class="logo-mark">EXPENSE</div>
    <h2 id="login-title">経費精算 <span>System</span></h2>
    <p class="login-sub" id="login-sub">ユーザー名を入力して開始してください</p>

</div>

function login() {
  const name = document.getElementById('login-input').value.trim();
  if (!name) { document.getElementById('login-input').focus(); return; }
  currentUser = name;
  localStorage.setItem('expense_user', name);
  document.getElementById('login-modal').classList.add('hidden');
  document.getElementById('user-name-display').textContent = name;
  document.getElementById('user-badge').style.display = 'flex';
  setNotionStatus('loading');
  loadFromNotion();

// ─── Load from Notion ─────────────────────────────────────────────────────────
async function loadFromNotion() {
  setNotionStatus('loading');
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'fetch', user: currentUser })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
    if (!Array.isArray(data) || data.length === 0) {
      setNotionStatus('ok');
      return;
    }
    // Clear and repopulate
    rows = [];
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    data.forEach(item => addRowData(item, false));
    maxRowNo = Math.max(0, ...rows.map(r => r.no || 0));

    // Assign numbers to items that have none, sorted by date ascending
    const unnumbered = rows.filter(r => r.no == null);
    if (unnumbered.length > 0) {
      unnumbered.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      unnumbered.forEach(r => {
        r.no = ++maxRowNo;
        const numCell = document.querySelector(`#row-${r.id} .num-cell`);
        if (numCell) numCell.textContent = String(r.no).padStart(2, '0');
      });
      const noUpdates = unnumbered.filter(r => r.notion_id).map(r => ({ notion_id: r.notion_id, no: r.no }));
      if (noUpdates.length > 0) {
        fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'updateNo', updates: noUpdates })
        }).catch(() => {});
      }
    }

    setNotionStatus('ok');
    showToast(T[lang].toastLoaded(data.length));
    filterRows();
  } catch (err) {
    setNotionStatus('err');
    console.error('Notion fetch error:', err.message);
    const errEl = document.getElementById('error-msg');
    errEl.innerHTML = `<strong>Notion Error:</strong> ${err.message}`;
    errEl.style.display = 'block';
  }
}

function loadFile(file) {
  currentMediaType = file.type || 'image/jpeg';
  const isPdf = currentMediaType === 'application/pdf';
  const reader = new FileReader();
  reader.onload = e => {
    if (isPdf) {
      currentImageBase64 = e.target.result.split(',')[1];
      showPreview(e.target.result, true, file.name);
      return;
    }
    // Resize image to max 2000px and compress to keep under Vercel's 4.5MB limit
    const img = new Image();
    img.onload = () => {
      const MAX = 2000;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      currentImageBase64 = dataUrl.split(',')[1];
      currentMediaType = 'image/jpeg';
      showPreview(dataUrl, false, '');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function showPreview(dataUrl, isPdf = false, pdfName = '') {
  const img = document.getElementById('preview-img');
  const pdf = document.getElementById('preview-pdf');
  if (isPdf) {
    img.style.display = 'none';
    pdf.style.display = 'flex';
    document.getElementById('preview-pdf-name').textContent = pdfName;
  } else {
    img.src = dataUrl;
    img.style.display = 'block';
    pdf.style.display = 'none';
  }
  document.getElementById('preview-wrap').style.display = 'block';
  document.getElementById('selection-flow').style.display = 'block';
  document.getElementById('step-payment').style.display = 'block';
  document.getElementById('step-cost').style.display = 'none';
  document.getElementById('step-remark').style.display = 'none';
  document.getElementById('analyze-btn').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';
  currentPaymentMethod = null; currentCostCenter = null; currentRemark = '';
  document.querySelectorAll('.sel-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('remark-input').value = '';
}

function clearPreview() {

// ─── Attach a photo to an existing row (manual or AI-parsed) ──────────────────
function readAndCompressFile(file) {
  return new Promise((resolve, reject) => {
    const mediaType = file.type || 'image/jpeg';
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('File read failed'));
    reader.onload = e => {
      if (mediaType === 'application/pdf') {
        resolve({ base64: e.target.result.split(',')[1], mediaType });
        return;
      }
      const img = new Image();
      img.onload = () => {
        const MAX = 2000;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        resolve({ base64: dataUrl.split(',')[1], mediaType: 'image/jpeg' });
      };
      img.onerror = () => reject(new Error('Image decode failed'));
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

let pendingPhotoRowId = null;

function triggerAttachPhoto(id) {
  const r = rows.find(r => r.id === id);

async function attachPhotoToRow(id, file) {
  const r = rows.find(r => r.id === id);

  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }

      method: 'POST',

      body: JSON.stringify({ action: 'attachReceipt', notion_id: r.notion_id, imageBase64: base64, mediaType, user: currentUser || '' })
    });

}

// ─── Batch upload queue ─────────────────────────────────────────────────────────
function loadBatchFiles(files) {
  batchQueue = files.map(file => ({
    id: 'b' + Date.now() + Math.floor(Math.random() * 999999),
    file,
    base64: null,
    mediaType: file.type || 'image/jpeg',
    isPdf: file.type === 'application/pdf',
    fileName: file.name,
    thumbUrl: '',
    paymentMethod: null,
    costCenter: null,
    remark: '',
    status: 'loading',
    errorMsg: '',
  }));
  document.getElementById('batch-queue-wrap').style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
  renderBatchQueue();
  batchQueue.forEach(item => {
    readBatchFile(item).then(() => renderBatchQueue());
  });
}

function readBatchFile(item) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      if (item.isPdf) {
        item.base64 = e.target.result.split(',')[1];
        item.status = 'pending';
        resolve();
        return;
      }
      const img = new Image();
      img.onload = () => {
        const MAX = 2000;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        item.base64 = dataUrl.split(',')[1];
        item.mediaType = 'image/jpeg';
        item.thumbUrl = dataUrl;
        item.status = 'pending';
        resolve();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(item.file);
  });
}

function renderBatchQueue() {
  const list = document.getElementById('batch-queue-list');
  if (!list) return;
  const t = T[lang];
  document.getElementById('batch-queue-count').textContent = t.batchCount(batchQueue.length);
  list.innerHTML = '';
  batchQueue.forEach(item => {
    const div = document.createElement('div');
    div.className = 'batch-item status-' + item.status;

    const thumb = document.createElement('div');
    thumb.className = 'batch-item-thumb';
    if (item.thumbUrl) {
      const img = document.createElement('img');
      img.src = item.thumbUrl;
      thumb.appendChild(img);
    } else {
      thumb.textContent = item.isPdf ? '📄' : '⏳';
    }

    const main = document.createElement('div');
    main.className = 'batch-item-main';

    const nameEl = document.createElement('div');
    nameEl.className = 'batch-item-name';
    nameEl.textContent = item.fileName;
    nameEl.title = item.fileName;

    const picks = document.createElement('div');
    picks.className = 'batch-item-picks';
    const pmRow = document.createElement('div');
    pmRow.className = 'mini-btns';
    ['Corporate', 'Personal', 'Cash'].forEach(v => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'mini-btn' + (item.paymentMethod === v ? ' selected' : '');
      b.textContent = v;
      b.onclick = () => selectBatchPayment(item.id, v);
      pmRow.appendChild(b);
    });
    const ccRow = document.createElement('div');
    ccRow.className = 'mini-btns';
    ['MSE', 'MJ', 'Other'].forEach(v => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'mini-btn' + (item.costCenter === v ? ' selected' : '');
      b.textContent = v;
      b.onclick = () => selectBatchCostCenter(item.id, v);
      ccRow.appendChild(b);
    });
    picks.appendChild(pmRow);
    picks.appendChild(ccRow);

    const remarkInput = document.createElement('input');
    remarkInput.type = 'text';
    remarkInput.className = 'batch-remark-input';
    remarkInput.placeholder = t.remarkPlaceholder;
    remarkInput.value = item.remark;
    remarkInput.oninput = () => { item.remark = remarkInput.value; };

    main.appendChild(nameEl);
    main.appendChild(picks);
    main.appendChild(remarkInput);

    const statusWrap = document.createElement('div');
    statusWrap.className = 'batch-item-status';
    const badge = document.createElement('span');
    badge.className = 'batch-status-badge';
    badge.textContent = t.batchStatus[item.status] || item.status;
    statusWrap.appendChild(badge);
    if (item.status === 'error' && item.errorMsg) {
      const errText = document.createElement('div');
      errText.className = 'batch-item-error';
      errText.textContent = item.errorMsg;
      statusWrap.appendChild(errText);
    }
    const btnRow = document.createElement('div');
    btnRow.className = 'mini-btns';
    if (item.status === 'error') {
      const retryBtn = document.createElement('button');
      retryBtn.type = 'button';
      retryBtn.className = 'batch-retry-btn';
      retryBtn.textContent = '↻';
      retryBtn.onclick = () => retryBatchItem(item.id);
      btnRow.appendChild(retryBtn);
    }
    if (item.status !== 'analyzing') {
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'batch-remove-btn';
      removeBtn.textContent = '✕';
      removeBtn.onclick = () => removeBatchItem(item.id);
      btnRow.appendChild(removeBtn);
    }
    statusWrap.appendChild(btnRow);

    div.appendChild(thumb);
    div.appendChild(main);
    div.appendChild(statusWrap);
    list.appendChild(div);
  });
  updateBatchAnalyzeBtn();
}

function updateBatchAnalyzeBtn() {
  const btn = document.getElementById('batch-analyze-btn');
  if (!btn) return;
  if (!batchProcessing) btn.textContent = T[lang].batchAnalyzeBtn;
  if (batchQueue.length === 0) return;
  const stillLoading = batchQueue.some(it => it.status === 'loading');
  const missingMeta = batchQueue.some(it => it.status !== 'done' && (!it.paymentMethod || !it.costCenter));
  const nothingToProcess = !batchQueue.some(it => it.status === 'pending' || it.status === 'error');
  btn.disabled = batchProcessing || stillLoading || missingMeta || nothingToProcess;
}

function selectBatchPayment(id, value) {
  const item = batchQueue.find(it => it.id === id);
  if (!item) return;
  item.paymentMethod = value;
  renderBatchQueue();
}

function selectBatchCostCenter(id, value) {
  const item = batchQueue.find(it => it.id === id);
  if (!item) return;
  item.costCenter = value;
  renderBatchQueue();
}

function removeBatchItem(id) {
  batchQueue = batchQueue.filter(it => it.id !== id);
  if (batchQueue.length === 0) clearBatchQueue();
  else renderBatchQueue();
}

function clearBatchQueue() {
  batchQueue = [];
  batchProcessing = false;
  const wrap = document.getElementById('batch-queue-wrap');
  if (wrap) wrap.style.display = 'none';
  const list = document.getElementById('batch-queue-list');
  if (list) list.innerHTML = '';
  document.getElementById('file-input').value = '';
}

async function processBatchItem(item) {
  item.status = 'analyzing';
  item.errorMsg = '';
  renderBatchQueue();
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'analyze', imageBase64: item.base64, mediaType: item.mediaType, paymentMethod: item.paymentMethod, costCenter: item.costCenter, remark: item.remark, user: currentUser, noStart: maxRowNo + 1 })
    });
    const text = await res.text();
    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { msg = JSON.parse(text).error || msg; } catch {}
      throw new Error(msg);
    }
    const data = JSON.parse(text);
    if (!Array.isArray(data)) throw new Error('Unexpected response');
    const serverNoStart = data[0]?.noStart ?? (maxRowNo + 1);
    data.slice().reverse().forEach((row, i) => addRowData({ ...row, paymentMethod: item.paymentMethod || '', costCenter: item.costCenter || '', remark: item.remark || '', no: serverNoStart + (data.length - 1 - i) }, true, true));
    maxRowNo = serverNoStart + data.length - 1;
    item.status = 'done';
    return true;
  } catch (err) {
    item.status = 'error';
    item.errorMsg = err.message;
    return false;
  } finally {
    renderBatchQueue();
  }
}

async function analyzeBatch() {
  if (batchProcessing) return;
  batchProcessing = true;
  updateBatchAnalyzeBtn();
  document.getElementById('batch-analyze-btn').textContent = T[lang].batchAnalyzing;
  document.getElementById('error-msg').style.display = 'none';

  const targets = batchQueue.filter(it => it.status === 'pending' || it.status === 'error');
  let successCount = 0, failCount = 0;
  for (const item of targets) {
    const ok = await processBatchItem(item);
    if (ok) successCount++; else failCount++;
  }

  batchProcessing = false;
  updateBatchAnalyzeBtn();
  setNotionStatus(failCount === 0 ? 'ok' : (successCount > 0 ? 'ok' : 'err'));
  if (successCount > 0) showToast(T[lang].toastAnalyzed(successCount));
  if (failCount > 0) {
    const errEl = document.getElementById('error-msg');
    errEl.innerHTML = `<strong>${T[lang].errFail}:</strong> ${T[lang].batchFailSummary(failCount)}`;
    errEl.style.display = 'block';
  }
  if (batchQueue.length > 0 && batchQueue.every(it => it.status === 'done')) clearBatchQueue();
}

async function retryBatchItem(id) {
  if (batchProcessing) return;
  const item = batchQueue.find(it => it.id === id);
  if (!item) return;
  batchProcessing = true;
  updateBatchAnalyzeBtn();
  const ok = await processBatchItem(item);
  batchProcessing = false;
  updateBatchAnalyzeBtn();
  if (ok) {
    showToast(T[lang].toastAnalyzed(1));
    if (batchQueue.every(it => it.status === 'done')) clearBatchQueue();
  }
}

function capturePhoto() {
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('camera-canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  currentImageBase64 = dataUrl.split(',')[1];
  currentMediaType = 'image/jpeg';
  closeCamera();
  showPreview(dataUrl);
  showToast(T[lang].toastCapture);
}

// ─── Analyze ──────────────────────────────────────────────────────────────────
async function analyzeReceipt() {
  if (!currentImageBase64) return;
  const t = T[lang];
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true; btn.textContent = '…';
  document.getElementById('loading-bar').classList.add('active');
  document.getElementById('loading-text').classList.add('active');
  document.getElementById('error-msg').style.display = 'none';

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'analyze', imageBase64: currentImageBase64, mediaType: currentMediaType, paymentMethod: currentPaymentMethod, costCenter: currentCostCenter, remark: currentRemark, user: currentUser, noStart: maxRowNo + 1 })
    });
    const text = await res.text();
    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { msg = JSON.parse(text).error || msg; } catch {}
      throw new Error(msg);
    }
    const data = JSON.parse(text);
    if (!Array.isArray(data)) throw new Error('Unexpected response');
    // Use server-determined noStart to keep maxRowNo in sync with Notion
    const serverNoStart = data[0]?.noStart ?? (maxRowNo + 1);
    data.slice().reverse().forEach((item, i) => addRowData({ ...item, paymentMethod: currentPaymentMethod || '', costCenter: currentCostCenter || '', remark: currentRemark || '', no: serverNoStart + (data.length - 1 - i) }, true, true));
    maxRowNo = serverNoStart + data.length - 1;
    setNotionStatus('ok');
    showToast(t.toastAnalyzed(data.length));
    clearPreview();
  } catch (err) {
    const errEl = document.getElementById('error-msg');
    errEl.innerHTML = `<strong>${T[lang].errFail}:</strong> ${err.message}`;
    errEl.style.display = 'block';
    setNotionStatus('err');
  } finally {
    btn.disabled = false; btn.textContent = T[lang].analyzeBtn;
    document.getElementById('loading-bar').classList.remove('active');
    document.getElementById('loading-text').classList.remove('active');
  }
}

// ─── Row management ───────────────────────────────────────────────────────────
function addRowData(item = {}, savedToNotion = false, toTop = false) {
  const emptyRow = document.getElementById('empty-row');
  if (emptyRow) emptyRow.remove();

  const id = 'r' + Date.now() + Math.floor(Math.random() * 9999);
  const catEn = item.category_en || CAT_JA_TO_EN[item.category_ja] || 'Other';
  const catJa = item.category_ja || CAT_EN_TO_JA[item.category_en] || 'その他';
  const row = {
    id,
    notion_id: item.notion_id || null,
    no: item.no ?? null,
    date: item.date || todayStr(),
    store: item.store || '',
    category_ja: catJa,
    category_en: catEn,
    currency: item.currency || 'JPY',
    amount: item.amount || 0,
    note_ja: item.note_ja || item.note_en || '',
    note_en: item.note_en || item.note_ja || '',
    paymentMethod: item.paymentMethod || '',
    costCenter: item.costCenter || '',
    remark: item.remark || '',
    status: item.status || 'Draft',
    eur_amount: item.eur_amount ?? null,
    receiptUrl: item.receiptUrl || null,
    savedToNotion,
  };
  if (toTop) {
    rows.unshift(row);
  } else {
    rows.push(row);
  }
  renderRow(row, toTop);
  updateSubtotals();
  return id;
}

function addRow() {
  const id = addRowData({ no: ++maxRowNo }, false, true);
  saveRow(id);
}

// ─── Search / filter ───────────────────────────────────────────────────────────
function rowMatchesSearch(r, q) {
  const fields = [
    r.date, r.store, r.category_ja, r.category_en, r.currency,
    String(r.amount ?? ''), r.paymentMethod, r.costCenter,
    r.note_ja, r.note_en, r.remark, r.status, String(r.no ?? ''),
  ];
  return fields.some(f => (f || '').toString().toLowerCase().includes(q));
}

function filterRows() {
  const input = document.getElementById('search-input');
  const q = (input?.value || '').trim().toLowerCase();
  const clearBtn = document.getElementById('search-clear');
  if (clearBtn) clearBtn.style.display = q ? 'flex' : 'none';

  let visibleCount = 0;
  rows.forEach(r => {
    const tr = document.getElementById('row-' + r.id);
    if (!tr) return;
    const matches = !q || rowMatchesSearch(r, q);
    tr.style.display = matches ? '' : 'none';
    if (matches) visibleCount++;
  });

  const countEl = document.getElementById('search-count');
  if (countEl) countEl.textContent = q ? `${visibleCount} / ${rows.length}` : '';
  if (window._syncMirrorWidth) window._syncMirrorWidth();
}

function clearSearch() {
  const input = document.getElementById('search-input');
  if (input) input.value = '';
  filterRows();
  if (input) input.focus();
}

function updateField(id, field, value) {
  const r = rows.find(r => r.id === id);
  if (!r) return;
  if (field === 'amount') { r.amount = parseFloat(value.replace(/[^0-9.]/g,'')) || 0; }
  else r[field] = value;
  updateSubtotals();
  scheduleAutosave(id);
}

// ─── Apply / Status ──────────────────────────────────────────────────────────
function toggleAllChecks(cb) {
  document.querySelectorAll('.row-check:not(:disabled)').forEach(c => c.checked = cb.checked);
}

async function updateRowStatus(targetRows, status) {
  const updates = targetRows.map(r => ({ notion_id: r.notion_id, status }));
  await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'updateStatus', updates }),
  });
  targetRows.forEach(r => {
    r.status = status;
    const badge = document.getElementById('status-' + r.id);
    if (badge) {
      badge.className = `status-badge status-${status}`;
      badge.textContent = status;
      badge.onclick = null;

    const cb = document.getElementById('check-' + r.id);
    if (cb) cb.disabled = true;
  });

let pendingSubmitRows = [];
let pendingDuplicateIds = new Set();

// ─── Auto-save on cell edit ────────────────────────────────────────────────────
const _autosaveTimers = {};
function scheduleAutosave(id) {
  clearTimeout(_autosaveTimers[id]);
  _autosaveTimers[id] = setTimeout(() => autosaveRow(id), 1200);
}

async function autosaveRow(id) {
  const r = rows.find(r => r.id === id);
  if (!r) return;
  if (!r.notion_id) {
    const btn = document.getElementById('save-btn-' + id);
    if (btn) btn.style.display = 'inline';
    return;
  }
  const badge = document.getElementById('notion-badge-' + id);
  if (badge) { badge.style.display = ''; badge.textContent = '⏳'; badge.style.color = 'var(--warn)'; }
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'updateRow',
        notion_id: r.notion_id,
        item: { store: r.store, date: r.date, category_en: r.category_en, amount: r.amount, currency: r.currency, note_en: r.note_en || '', note_ja: r.note_ja || '', paymentMethod: r.paymentMethod || '', costCenter: r.costCenter || '', remark: r.remark || '' }
      })
    });
    if (badge) {
      badge.textContent = '✓N';
      badge.style.color = res.ok ? '' : 'var(--warn)';
      badge.title = res.ok ? 'Saved to Notion' : 'Save failed';
    }
  } catch {
    if (badge) { badge.textContent = '!N'; badge.style.color = 'var(--warn)'; }
  }
}

async function manualSaveRow(id) {
  const r = rows.find(r => r.id === id);
  if (!r) return;
  if (r.notion_id) { await autosaveRow(id); }
  else { await saveRow(id); }
  const btn = document.getElementById('save-btn-' + id);
  if (btn) btn.style.display = 'none';
}

// ─── Duplicate detection ───────────────────────────────────────────────────────
function areDuplicates(a, b) {
  if (a.date !== b.date) return false;
  const sa = (a.store || '').toLowerCase().trim();
  const sb = (b.store || '').toLowerCase().trim();
  if (sa && sb && sa === sb) return true;
  const aa = parseFloat(a.amount) || 0;
  const ab2 = parseFloat(b.amount) || 0;
  if (aa > 0 && aa === ab2 && a.currency === b.currency) return true;
  return false;
}

function findDuplicates(items) {
  const pairs = [];
  const selIds = new Set(items.map(r => r.id));
  for (let i = 0; i < items.length; i++) {
    for (let j = i + 1; j < items.length; j++) {
      if (areDuplicates(items[i], items[j])) pairs.push({ a: items[i], b: items[j] });
    }
    rows.forEach(other => {
      if (selIds.has(other.id)) return;
      if (other.status !== 'Submitted' && other.status !== 'Approved') return;
      if (areDuplicates(items[i], other)) pairs.push({ a: items[i], b: other });
    });
  }
  return pairs;
}

function openApplyModal(items) {
  pendingSubmitRows = items;
  pendingDuplicateIds = new Set();
  const dups = findDuplicates(items);
  dups.forEach(p => pendingDuplicateIds.add(p.a.id));

  const t = T[lang];
  document.getElementById('am-title').textContent = t.amTitle;
  document.getElementById('am-sub').textContent = t.amSub(items.length);
  document.getElementById('am-cancel').textContent = t.amCancel;
  document.getElementById('am-th-date').textContent = t.thDate;
  document.getElementById('am-th-store').textContent = t.thStore;
  document.getElementById('am-th-cat').textContent = t.thCat;
  document.getElementById('am-th-amt').textContent = t.thAmt;
  document.getElementById('am-body').innerHTML = items.map(r => {
    const cat = lang === 'ja' ? r.category_ja : r.category_en;
    const isDup = pendingDuplicateIds.has(r.id);
    return `<tr class="${isDup ? 'apply-dup-row' : ''}">
      <td>${String(r.no ?? '—').padStart(2,'0')}${isDup ? ' ⚠' : ''}</td>
      <td>${r.date}</td>
      <td>${r.store}</td>
      <td>${cat}</td>
      <td>${Number(r.amount).toLocaleString()} ${r.currency}</td>
    </tr>`;
  }).join('');
  const totals = {};
  items.forEach(r => { totals[r.currency] = (totals[r.currency] || 0) + (parseFloat(r.amount) || 0); });
  document.getElementById('am-totals').innerHTML =
    Object.entries(totals).map(([cur, amt]) => `<span>${cur}: <strong>${amt.toLocaleString()}</strong></span>`).join('');

  const dupSection = document.getElementById('am-dup-section');
  const skipBtn = document.getElementById('am-skip');
  const confirmBtn = document.getElementById('am-confirm');
  if (dups.length > 0) {
    dupSection.style.display = 'block';
    skipBtn.style.display = '';
    skipBtn.textContent = t.amSubmitSkipDups;
    confirmBtn.textContent = t.amSubmitAll;
    document.getElementById('am-dup-title').textContent = t.amDupTitle;
    document.getElementById('am-dup-desc').textContent = t.amDupDesc(dups.length);
    document.getElementById('am-dup-list').innerHTML = dups.map(({ a, b }) => {
      const noA = String(a.no ?? '—').padStart(2, '0');
      const noB = String(b.no ?? '—').padStart(2, '0');
      return `<li>No.${noA} ${a.store||'—'} (${a.date} / ${a.currency} ${Number(a.amount).toLocaleString()}) ↔ No.${noB} ${b.store||'—'}</li>`;
    }).join('');
  } else {
    dupSection.style.display = 'none';
    skipBtn.style.display = 'none';
    confirmBtn.textContent = t.amConfirm;
  }
  document.getElementById('apply-modal').classList.remove('hidden');
}

function closeApplyModal() {
  document.getElementById('apply-modal').classList.add('hidden');
  pendingSubmitRows = [];
  pendingDuplicateIds = new Set();
}

async function confirmSubmit() {
  const toSubmit = pendingSubmitRows.slice();
  closeApplyModal();
  await updateRowStatus(toSubmit, 'Submitted');
  showToast(T[lang].toastApplied(toSubmit.length));
  document.getElementById('check-all').checked = false;
}

async function confirmSubmitSkipDups() {
  const toSubmit = pendingSubmitRows.filter(r => !pendingDuplicateIds.has(r.id));
  const skipped = pendingSubmitRows.length - toSubmit.length;
  closeApplyModal();
  if (!toSubmit.length) { showToast(T[lang].toastNoneApplicable); return; }
  await updateRowStatus(toSubmit, 'Submitted');
  showToast(T[lang].toastAppliedSkip(toSubmit.length, skipped));
  document.getElementById('check-all').checked = false;
}

function submitRow(id) {
  const r = rows.find(r => r.id === id);
  if (!r) return;
  if (!r.notion_id) return showToast(T[lang].toastNoNotion);
  if (r.status === 'Submitted' || r.status === 'Approved') return;
  openApplyModal([r]);
}

function submitSelected() {
  const t = T[lang];
  const checked = rows.filter(r => {
    const cb = document.getElementById('check-' + r.id);
    return cb && cb.checked;
  });
  if (checked.length === 0) return showToast(t.toastNoneSelected);
  const submittable = checked.filter(r => r.notion_id && r.status !== 'Submitted' && r.status !== 'Approved');
  if (submittable.length === 0) return showToast(t.toastNoneApplicable);
  openApplyModal(submittable);
}

function updateCat(id, value) {
  const r = rows.find(r => r.id === id);
  if (!r) return;
  if (lang === 'ja') { r.category_ja = value; r.category_en = CAT_JA_TO_EN[value] || 'Other'; }
  else { r.category_en = value; r.category_ja = CAT_EN_TO_JA[value] || 'その他'; }
  scheduleAutosave(id);
}

function updateNote(id, value) {
  const r = rows.find(r => r.id === id);
  if (!r) return;
  if (lang === 'ja') r.note_ja = value; else r.note_en = value;
  scheduleAutosave(id);
}

async function deleteRow(id) {
  const r = rows.find(r => r.id === id);
  const label = r?.store ? `"${r.store}"` : (lang === 'ja' ? 'この行' : 'this row');
  if (!confirm(lang === 'ja' ? `${label} を削除しますか？` : `Delete ${label}?`)) return;
  if (r && r.notion_id) {
    fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', notion_id: r.notion_id })
    }).catch(() => {});
  }
  rows = rows.filter(r => r.id !== id);
  document.getElementById('row-' + id)?.remove();
  if (!rows.length) {
    document.getElementById('table-body').innerHTML = `<tr id="empty-row"><td colspan="13"><div class="empty-state"><div class="icon">📋</div><p id="empty-txt">${T[lang].emptyTxt}</p></div></td></tr>`;
    document.getElementById('subtotals-strip').style.display = 'none';
    const searchCountEl = document.getElementById('search-count');
    if (searchCountEl) searchCountEl.textContent = '';
  } else {
    renumberRows();
    updateSubtotals();
    filterRows();
  }
  showToast(T[lang].toastDeleted);
}

function renumberRows() {
  // Sort by current no ascending (nulls last), reassign 1..N
  const sorted = [...rows].sort((a, b) => {
    if (a.no == null && b.no == null) return 0;
    if (a.no == null) return 1;
    if (b.no == null) return -1;
    return a.no - b.no;
  });

  const noUpdates = [];
  sorted.forEach((r, i) => {
    const newNo = i + 1;
    if (r.no !== newNo) {
      r.no = newNo;
      const numCell = document.querySelector(`#row-${r.id} .num-cell`);
      if (numCell) numCell.textContent = String(newNo).padStart(2, '0');
      if (r.notion_id) noUpdates.push({ notion_id: r.notion_id, no: newNo });
    }
  });
  maxRowNo = rows.length;

  if (noUpdates.length > 0) {
    fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'updateNo', updates: noUpdates })
    }).catch(() => {});
  }
}

// ─── Subtotals ────────────────────────────────────────────────────────────────
function updateSubtotals() {
  const totals = {};
  let eurTotal = 0;
  let hasEurConversion = false;
  rows.forEach(r => {
    const cur = r.currency || 'JPY';
    totals[cur] = (totals[cur] || 0) + (parseFloat(r.amount) || 0);
    if (r.eur_amount != null) {
      eurTotal += r.eur_amount;
      hasEurConversion = true;
    }
  });

  const chips = document.getElementById('subtotal-chips');
  const currencyChips = Object.entries(totals).map(([cur, amt]) => {
    const sym = CURRENCY_SYMBOLS[cur] || cur;
    return `<div class="subtotal-chip">
      <span class="chip-label">${T[lang].subtotalLabel(cur)}</span>
      <span class="chip-value">${sym}${amt.toLocaleString()}</span>
    </div>`;
  }).join('');
  const eurChip = hasEurConversion
    ? `<div class="subtotal-chip subtotal-chip-eur">
        <span class="chip-label">${T[lang].eurTotal}</span>
        <span class="chip-value">€${eurTotal.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
      </div>`
    : '';
  chips.innerHTML = currencyChips + eurChip;
  document.getElementById('edit-hint').textContent = T[lang].editHint;

  // Payment method breakdown (Draft vs Submitted)
  const pmDraft = {}, pmSubmitted = {}, pmSubmittedEUR = {};
  rows.forEach(r => {
    const pm = r.paymentMethod || '';
    const cur = r.currency || 'JPY';
    const amt = parseFloat(r.amount) || 0;
    const isSub = r.status === 'Submitted' || r.status === 'Approved';
    if (isSub) {
      if (!pmSubmitted[pm]) pmSubmitted[pm] = {};
      pmSubmitted[pm][cur] = (pmSubmitted[pm][cur] || 0) + amt;
      if (r.eur_amount != null) pmSubmittedEUR[pm] = (pmSubmittedEUR[pm] || 0) + r.eur_amount;
    } else {
      if (!pmDraft[pm]) pmDraft[pm] = {};
      pmDraft[pm][cur] = (pmDraft[pm][cur] || 0) + amt;
    }
  });

  const pmEl = document.getElementById('pm-subtotals');
  const allPMs = [...new Set([...Object.keys(pmDraft), ...Object.keys(pmSubmitted)])].sort((a, b) => a === '' ? 1 : b === '' ? -1 : a.localeCompare(b));
  if (rows.length > 0 && allPMs.length > 0) {
    const t2 = T[lang];
    const fmtAmts = (map, pm) => {
      if (!map[pm]) return '—';
      return Object.entries(map[pm]).map(([c, a]) => `${CURRENCY_SYMBOLS[c]||c}${a.toLocaleString()}`).join(' / ');
    };
    const fmtEUR = (pm) => {
      const eur = pmSubmittedEUR[pm];
      if (eur == null) return '—';
      return `€${eur.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
    };
    let html = `<div class="pm-subtotals-title">${t2.pmSubtotalsTitle}</div>
      <table class="pm-table"><thead><tr>
        <th></th><th>${t2.pmDraftLabel}</th><th>${t2.pmSubmittedLabel}</th>
      </tr></thead><tbody>`;
    allPMs.forEach(pm => {
      const label = pm || t2.pmUnspecified;
      html += `<tr>
        <td class="pm-label">${label}</td>
        <td class="pm-draft">${fmtAmts(pmDraft, pm)}</td>
        <td class="pm-submitted-amt">${fmtEUR(pm)}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    pmEl.innerHTML = html;
    pmEl.style.display = 'block';
  } else {
    pmEl.style.display = 'none';
  }
}

// ─── Export ───────────────────────────────────────────────────────────────────
function getExportRows() {
  return rows.map((r,i) => ({
    no: i+1, date: r.date, store: r.store,
    category: lang==='ja' ? r.category_ja : r.category_en,
    currency: r.currency,
    amount: r.amount,
    paymentMethod: r.paymentMethod || '',
    costCenter: r.costCenter || '',
    note: lang==='ja' ? (r.note_ja||'') : (r.note_en||''),
    remark: r.remark || ''
  }));
}

function downloadCSV() {
  const t = T[lang];
  if (!rows.length) { showToast(t.toastEmpty); return; }
  const headers = ['No', t.thDate, t.thStore, t.thCat, t.thCur, t.thAmt, t.thPayment, t.thCC, t.thNote, t.thRemark];
  const data = getExportRows();
  const csv = '\uFEFF' + [headers, ...data.map(r=>[r.no,r.date,r.store,r.category,r.currency,r.amount,r.paymentMethod,r.costCenter,r.note,r.remark])]
    .map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  triggerDownload(t.filename + '_' + todayStr() + '.csv', csv, 'text/csv;charset=utf-8');
  showToast(t.toastCSV);
}

function downloadExcel() {
  const t = T[lang];
  if (!rows.length) { showToast(t.toastEmpty); return; }
  const headers = ['No', t.thDate, t.thStore, t.thCat, t.thCur, t.thAmt, t.thPayment, t.thCC, t.thNote, t.thRemark];
  const data = getExportRows();

  // Subtotal rows per currency
  const totals = {};
  data.forEach(r => { totals[r.currency] = (totals[r.currency]||0) + (parseFloat(r.amount)||0); });

  const cell = v => `<td style="border:1px solid #ddd;padding:7px">${v}</td>`;
  const hcell = v => `<th style="background:#1a3a2a;color:#4fffb0;font-weight:bold;border:1px solid #aaa;padding:7px">${v}</th>`;
  let tbl = `<table><tr>${headers.map(hcell).join('')}</tr>`;
  data.forEach(r => { tbl += `<tr>${[r.no,r.date,r.store,r.category,r.currency,r.amount,r.paymentMethod,r.costCenter,r.note,r.remark].map(cell).join('')}</tr>`; });
  Object.entries(totals).forEach(([cur, amt]) => {
    tbl += `<tr><td colspan="5" style="font-weight:bold;text-align:right;border:1px solid #ddd;padding:7px">${t.totalRow} (${cur})</td><td style="font-weight:bold;border:1px solid #ddd;padding:7px">${amt.toLocaleString()}</td><td colspan="4" style="border:1px solid #ddd;padding:7px"></td></tr>`;
  });
  tbl += '</table>';
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><meta name="ProgId" content="Excel.Sheet"></head><body>${tbl}</body></html>`;
  triggerDownload(t.filename + '_' + todayStr() + '.xls', '\uFEFF' + html, 'application/vnd.ms-excel;charset=utf-8');
  showToast(t.toastXLS);
}

function triggerDownload(filename, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function todayStr() { return new Date().toISOString().slice(0,10); }

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ─── Save manual row to Notion ────────────────────────────────────────────────
async function saveRow(id) {
  const r = rows.find(r => r.id === id);
  if (!r || r.savedToNotion) return;
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'save',
        item: {
          store: r.store,
          date: r.date,
          category_en: r.category_en,
          category_ja: r.category_ja,
          amount: r.amount,
          currency: r.currency,
          note_en: r.note_en || r.note_ja || '',
          note_ja: r.note_ja || r.note_en || '',
          paymentMethod: r.paymentMethod || '',
          costCenter: r.costCenter || '',
          remark: r.remark || '',
          user: currentUser || '',
          no: r.no,
          status: r.status || 'Draft',
        }
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
    if (data.notion_id) {
      r.notion_id = data.notion_id;
      r.savedToNotion = true;
      if (data.eur_amount != null) r.eur_amount = data.eur_amount;
      const badge = document.getElementById('notion-badge-' + id);
      if (badge) badge.style.display = '';
      const statusBadge = document.getElementById('status-' + r.id);
      if (statusBadge && r.status !== 'Submitted' && r.status !== 'Approved') {
        statusBadge.classList.add('clickable');
        statusBadge.onclick = () => submitRow(r.id);
      }
    }
  } catch (err) {
    console.error('Auto-save failed:', err.message);
  }
}

// ─── Backfill EUR amounts in Notion ───────────────────────────────────────────
async function backfillEUR() {
  const btn = document.getElementById('btn-backfill-eur');
  btn.disabled = true;
  showToast('⏳ EUR補完中…');
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'backfillEUR' })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
    showToast(`✅ ${data.updated}件を更新（${data.skipped}件はレート取得不可でスキップ）`);
    if (data.updated > 0) loadFromNotion();
  } catch (err) {
    showToast('⚠ エラー: ' + err.message);
  } finally {
    btn.disabled = false;
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function initTopScrollbar() {
  const wrap = document.querySelector('.table-wrap');
  if (!wrap) return;
  const mirror = document.createElement('div');
  mirror.className = 'scroll-mirror';
  const inner = document.createElement('div');
  inner.className = 'scroll-mirror-inner';
  mirror.appendChild(inner);
  wrap.parentNode.insertBefore(mirror, wrap);

  let syncing = false;
  window._syncMirrorWidth = () => {
    inner.style.width = wrap.scrollWidth + 'px';
  };
  window._syncMirrorWidth();
  new ResizeObserver(window._syncMirrorWidth).observe(wrap);
  new ResizeObserver(window._syncMirrorWidth).observe(wrap.querySelector('table'));

  mirror.addEventListener('scroll', () => {
    if (!syncing) { syncing = true; wrap.scrollLeft = mirror.scrollLeft; syncing = false; }
  });
  wrap.addEventListener('scroll', () => {
    if (!syncing) { syncing = true; mirror.scrollLeft = wrap.scrollLeft; syncing = false; }
  });
}

window.addEventListener('load', () => {
  const savedLang = localStorage.getItem('expense_lang');
  setLang(savedLang || 'en');
  initTopScrollbar();

  const savedUser = localStorage.getItem('expense_user');
  if (savedUser) {
    currentUser = savedUser;
    document.getElementById('user-name-display').textContent = savedUser;
    document.getElementById('user-badge').style.display = 'flex';
    document.getElementById('login-modal').classList.add('hidden');
    setNotionStatus('loading');
    loadFromNotion();
  }
  // login modal stays visible if no saved user
});
</script>
